<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Fieldtone — a sound for every place and time</title>
<meta name="description" content="A continuous, generative ambient sound unique to every location and moment on Earth.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --top: hsl(232 42% 7%);
    --bottom: hsl(232 38% 12%);
    --ink: rgba(236,238,250,0.94);
    --faint: rgba(236,238,250,0.45);
    --line: rgba(236,238,250,0.16);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; }
  body {
    background: linear-gradient(180deg, var(--top) 0%, var(--bottom) 100%);
    background-attachment: fixed;
    transition: background 2s ease;
    color: var(--ink);
    font-family: 'Space Grotesk', sans-serif;
    display: flex; flex-direction: column; align-items: center;
    padding: max(36px, env(safe-area-inset-top)) 20px 56px;
    -webkit-tap-highlight-color: transparent;
  }
  .mono { font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.14em; text-transform: uppercase; }
  header { text-align: center; }
  #coords { font-size: 10px; letter-spacing: 0.22em; color: var(--faint); margin-bottom: 8px; min-height: 13px; }
  h1 { font-weight: 300; font-size: 30px; letter-spacing: 0.04em; margin: 0; transition: opacity 1.5s; }
  h1.fading { opacity: 0.3; }
  #meta { font-size: 10px; color: var(--faint); margin-top: 8px; min-height: 13px; }
  #circle { position: relative; width: 230px; height: 230px; margin: 34px 0 8px; background: transparent; border: none; cursor: pointer; }
  #circle .ring {
    position: absolute; border-radius: 50%; border: 1px solid var(--line);
    opacity: 0.5; transition: opacity 1s;
  }
  body.playing #circle .ring { opacity: 1; animation: breathe var(--dur, 9s) ease-in-out infinite; }
  #dot {
    position: absolute; top: 50%; left: 50%; width: 8px; height: 8px; margin: -4px 0 0 -4px;
    border-radius: 50%; background: var(--ink);
  }
  body.playing.grooving #dot { animation: pulse var(--beat, 1s) ease-out infinite; }
  #hint { font-size: 9px; color: var(--faint); }
  #weather { font-size: 9px; color: var(--faint); margin-top: 10px; min-height: 12px; }
  .searchrow { width: min(340px, 100%); margin-top: 30px; position: relative; }
  .searchbar { display: flex; gap: 10px; align-items: center; }
  #q {
    flex: 1; background: transparent; border: none; border-bottom: 1px solid var(--line);
    color: var(--ink); font-family: 'Space Grotesk', sans-serif; font-size: 16px; padding: 8px 2px;
  }
  #q::placeholder { color: var(--ink); opacity: 0.4; }
  #locate {
    background: transparent; border: 1px solid var(--line); border-radius: 999px; color: var(--ink);
    font-size: 9px; padding: 8px 13px; cursor: pointer; white-space: nowrap;
  }
  #results {
    position: absolute; top: 100%; left: 0; right: 0; z-index: 5;
    background: var(--top); border: 1px solid var(--line); border-radius: 4px; margin-top: 4px;
    display: none;
  }
  #results.open { display: block; }
  #results button {
    display: block; width: 100%; text-align: left; background: transparent; border: none;
    color: var(--ink); font-family: 'Space Grotesk', sans-serif; font-size: 15px; padding: 11px 12px; cursor: pointer;
  }
  #results button .sub { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--faint); margin-left: 10px; }
  #msg { font-size: 9px; color: var(--faint); margin-top: 14px; text-align: center; min-height: 12px; }
  button:focus-visible, input:focus-visible { outline: 2px solid currentColor; outline-offset: 3px; }
  @keyframes breathe { 0%,100% { transform: scale(1); opacity: 0.55; } 50% { transform: scale(1.12); opacity: 0.95; } }
  @keyframes pulse { 0%,100% { transform: scale(1); } 12% { transform: scale(1.35); } }
  @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
</style>
</head>
<body>
  <header>
    <div id="coords" class="mono"></div>
    <h1 id="title">Somewhere</h1>
    <div id="meta" class="mono"></div>
  </header>

  <button id="circle" aria-label="Begin sound">
    <span id="rings"></span>
    <span id="dot"></span>
  </button>
  <div id="hint" class="mono">tap to listen</div>
  <div id="weather" class="mono"></div>

  <div class="searchrow">
    <div class="searchbar">
      <input id="q" placeholder="go anywhere on earth…" aria-label="Search for a place" autocomplete="off">
      <button id="locate" class="mono" aria-label="Use my location">◎ locate me</button>
    </div>
    <div id="results" role="listbox"></div>
  </div>
  <div id="msg" class="mono"></div>

<script src="https://unpkg.com/tone@14.8.49/build/Tone.js"></script>
<script>
/* ================================================================== */
/* Seeding                                                             */
/* ================================================================== */
const hashStr = (s) => { let h = 2166136261 >>> 0; for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); } return h >>> 0; };
const mulberry32 = (a) => () => { a |= 0; a = (a + 0x6d2b79f5) | 0; let t = Math.imul(a ^ (a >>> 15), 1 | a); t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t; return ((t ^ (t >>> 14)) >>> 0) / 4294967296; };
const euclid = (hits, steps, rot = 0) => { const p = []; let b = 0; for (let i = 0; i < steps; i++) { b += hits; if (b >= steps) { b -= steps; p.push(1); } else p.push(0); } return p.map((_, i) => p[(i + rot) % steps]); };
/* Diatonic chord built by stacking thirds within the scale, so chord tones
   and melody always share the same key. Returns semitone offsets from the root. */
const triad = (scale, di, seventh) => {
  const L = scale.ints.length;
  const steps = seventh ? [0, 2, 4, 6] : [0, 2, 4];
  return steps.map((s) => { const j = di + s; return scale.ints[((j % L) + L) % L] + 12 * Math.floor(j / L); });
};

const SCALES = [
  // church modes
  { name: "Ionian", ints: [0, 2, 4, 5, 7, 9, 11] },
  { name: "Dorian", ints: [0, 2, 3, 5, 7, 9, 10] },
  { name: "Phrygian", ints: [0, 1, 3, 5, 7, 8, 10] },
  { name: "Lydian", ints: [0, 2, 4, 6, 7, 9, 11] },
  { name: "Mixolydian", ints: [0, 2, 4, 5, 7, 9, 10] },
  { name: "Aeolian", ints: [0, 2, 3, 5, 7, 8, 10] },
  { name: "Locrian", ints: [0, 1, 3, 5, 6, 8, 10] },
  // minor variants & jazz modes
  { name: "Harmonic minor", ints: [0, 2, 3, 5, 7, 8, 11] },
  { name: "Melodic minor", ints: [0, 2, 3, 5, 7, 9, 11] },
  { name: "Lydian dominant", ints: [0, 2, 4, 6, 7, 9, 10] },
  { name: "Phrygian dominant", ints: [0, 1, 4, 5, 7, 8, 10] },
  { name: "Ukrainian Dorian", ints: [0, 2, 3, 6, 7, 9, 10] },
  { name: "Altered", ints: [0, 1, 3, 4, 6, 8, 10] },
  { name: "Locrian ♮6", ints: [0, 1, 3, 5, 6, 9, 10] },
  // pentatonic & hexatonic
  { name: "Major pentatonic", ints: [0, 2, 4, 7, 9] },
  { name: "Minor pentatonic", ints: [0, 3, 5, 7, 10] },
  { name: "Egyptian", ints: [0, 2, 5, 7, 10] },
  { name: "Blues", ints: [0, 3, 5, 6, 7, 10] },
  { name: "Man Gong", ints: [0, 3, 5, 8, 10] },
  { name: "Ritusen", ints: [0, 2, 5, 7, 9] },
  { name: "Prometheus", ints: [0, 2, 4, 6, 9, 10] },
  { name: "Tritone", ints: [0, 1, 4, 6, 7, 10] },
  // symmetric
  { name: "Whole tone", ints: [0, 2, 4, 6, 8, 10] },
  { name: "Octatonic", ints: [0, 2, 3, 5, 6, 8, 9, 11] },
  { name: "Half–whole", ints: [0, 1, 3, 4, 6, 7, 9, 10] },
  { name: "Augmented", ints: [0, 3, 4, 7, 8, 11] },
  // Japanese
  { name: "Hirajoshi", ints: [0, 2, 3, 7, 8] },
  { name: "Kumoi", ints: [0, 2, 3, 7, 9] },
  { name: "In sen", ints: [0, 1, 5, 7, 8] },
  { name: "Iwato", ints: [0, 1, 5, 6, 10] },
  { name: "Pelog", ints: [0, 1, 3, 7, 8] },
  // Middle-Eastern, Indian, chromatic-color
  { name: "Double harmonic", ints: [0, 1, 4, 5, 7, 8, 11] },
  { name: "Hungarian minor", ints: [0, 2, 3, 6, 7, 8, 11] },
  { name: "Neapolitan minor", ints: [0, 1, 3, 5, 7, 8, 11] },
  { name: "Neapolitan major", ints: [0, 1, 3, 5, 7, 9, 11] },
  { name: "Enigmatic", ints: [0, 1, 4, 6, 8, 10, 11] },
  { name: "Persian", ints: [0, 1, 4, 5, 6, 8, 11] },
  { name: "Todi", ints: [0, 1, 3, 6, 7, 8, 11] },
  { name: "Marwa", ints: [0, 1, 4, 6, 7, 9, 11] },
  { name: "Purvi", ints: [0, 1, 4, 6, 7, 8, 11] },
];

/* Timbre families — each gives a place a distinct instrument character.
   bias = register shift (semitones); vol = per-voice level; atk = attack multiplier;
   len = note length as fraction of loop interval; osc = base Tone oscillator config;
   kind = synth architecture (default Synth; fm/am/mono/duo/pluck/metal);
   harm/index = FM/AM centres (jittered per place); lp = [min,max] per-voice lowpass. */
const PALETTES = [
  // sustained oscillator pads
  { id: "glass",   mood: "glass",    bias:  5, vol: -15, atk: 1.0, len: 0.55, osc: { type: "fatsine" } },
  { id: "wool",    mood: "wool",     bias: -4, vol: -12, atk: 1.4, len: 0.62, osc: { type: "fattriangle" } },
  { id: "choir",   mood: "choir",    bias:  4, vol: -16, atk: 1.5, len: 0.66, osc: { type: "fatsine" } },
  { id: "ether",   mood: "ether",    bias:  6, vol: -17, atk: 1.6, len: 0.70, osc: { type: "fatsine" } },
  { id: "deep",    mood: "deep",     bias:-12, vol:  -9, atk: 1.6, len: 0.72, osc: { type: "sine" } },
  { id: "sub",     mood: "sub",      bias:-14, vol:  -8, atk: 1.3, len: 0.75, osc: { type: "triangle" } },
  { id: "crystal", mood: "crystal",  bias:  9, vol: -18, atk: 0.9, len: 0.50, osc: { type: "sine3" } },
  { id: "organ",   mood: "organ",    bias:  0, vol: -17, atk: 0.8, len: 0.60, osc: { type: "sine4" } },
  // reed / string (bright oscillators tamed by a lowpass)
  { id: "reed",    mood: "reed",     bias:  0, vol: -24, atk: 1.2, len: 0.62, osc: { type: "sawtooth" },    lp: [520, 1000] },
  { id: "string",  mood: "strings",  bias:  2, vol: -24, atk: 1.7, len: 0.68, osc: { type: "fatsawtooth" }, lp: [600, 1600] },
  { id: "hollow",  mood: "hollow",   bias: -2, vol: -20, atk: 1.1, len: 0.60, osc: { type: "square" },      lp: [440, 900] },
  { id: "quill",   mood: "quill",    bias:  3, vol: -22, atk: 0.7, len: 0.50, osc: { type: "pulse" },       lp: [700, 1800] },
  // FM
  { id: "vapor",   mood: "vapor",    bias:  2, vol: -16, atk: 1.0, len: 0.60, kind: "fm", harm: 1.004, index: 2.2 },
  { id: "bell",    mood: "bells",    bias:  7, vol: -19, atk: 0.2, len: 0.42, kind: "fm", harm: 3.01,  index: 8 },
  { id: "gong",    mood: "gong",     bias: -3, vol: -16, atk: 0.3, len: 0.60, kind: "fm", harm: 1.41,  index: 13 },
  { id: "chime",   mood: "chime",    bias: 10, vol: -20, atk: 0.2, len: 0.40, kind: "fm", harm: 7.02,  index: 5 },
  // AM
  { id: "haze",    mood: "haze",     bias:  0, vol: -22, atk: 1.1, len: 0.56, kind: "am", harm: 2.4, lp: [700, 1400] },
  { id: "shimmer", mood: "shimmer",  bias:  6, vol: -21, atk: 1.2, len: 0.58, kind: "am", harm: 3.5, lp: [900, 2600] },
  // filtered mono (evolving under a filter envelope)
  { id: "vox",     mood: "vox",      bias:  1, vol: -18, atk: 1.3, len: 0.66, kind: "mono", osc: { type: "sawtooth" } },
  { id: "wax",     mood: "wax",      bias: -5, vol: -16, atk: 1.1, len: 0.64, kind: "mono", osc: { type: "square" } },
  // detuned duo (slow beating + vibrato)
  { id: "drift",   mood: "drift",    bias:  0, vol: -20, atk: 1.4, len: 0.66, kind: "duo" },
  // plucked / struck
  { id: "koto",    mood: "koto",     bias:  5, vol: -14, atk: 0.0, len: 0.50, kind: "pluck" },
  { id: "metal",   mood: "metallic", bias:  8, vol: -26, atk: 0.0, len: 0.50, kind: "metal", harm: 2.01, index: 20 },
  // — cyberpunk / aggressive (drive hard, bright, edged) —
  { id: "acid",    mood: "acid",     bias:  0, vol: -20, atk: 0.05,len: 0.45, kind: "mono", osc: { type: "sawtooth" }, dirt: 0.5 },
  { id: "neon",    mood: "neon",     bias:  5, vol: -18, atk: 0.3, len: 0.5,  osc: { type: "pwm" },        dirt: 0.35 },
  { id: "rasp",    mood: "rasp",     bias:  2, vol: -22, atk: 0.6, len: 0.55, osc: { type: "fatsquare" },  dirt: 0.4, lp: [900, 3200] },
  { id: "chrome",  mood: "chrome",   bias:  6, vol: -19, atk: 0.4, len: 0.5,  kind: "fm", harm: 2.5, index: 16, dirt: 0.3 },
  { id: "industrial", mood: "industrial", bias: -1, vol: -21, atk: 0.5, len: 0.55, osc: { type: "fatsawtooth" }, dirt: 0.6, lp: [500, 2400] },
  { id: "grime",   mood: "grime",    bias: -6, vol: -16, atk: 0.4, len: 0.6,  kind: "mono", osc: { type: "square" }, dirt: 0.55 },
  // — soft / intimate (clean, slow, felt) —
  { id: "felt",    mood: "felt",     bias: -2, vol: -14, atk: 2.2, len: 0.75, osc: { type: "sine" } },
  { id: "breath",  mood: "breath",   bias:  1, vol: -19, atk: 2.6, len: 0.78, osc: { type: "fattriangle" } },
  { id: "dust",    mood: "dust",     bias: -3, vol: -17, atk: 2.0, len: 0.72, kind: "am", harm: 1.5, lp: [400, 900] },
  { id: "velvet",  mood: "velvet",   bias: -4, vol: -13, atk: 2.4, len: 0.76, osc: { type: "fatsine" } },
];

const KITS = ["pulse", "dub", "tickle", "tribal", "house", "broken"];

/* Per-place colour effect inserted across the drone bus — a big multiplier on feel.
   "none" weighted twice so roughly a third of places stay uncoloured. */
const FXS = ["none", "none", "chorus", "phaser", "tremolo", "vibrato", "autofilter", "chebyshev", "bitcrush"];

const CELL = 0.001;
const cellOf = (lat, lng) => ({ lat: Math.round(lat / CELL) * CELL, lng: Math.round(lng / CELL) * CELL });

function makeCharacter(lat, lng) {
  const c = cellOf(lat, lng);
  const key = c.lat.toFixed(3) + "," + c.lng.toFixed(3);
  const rng = mulberry32(hashStr(key));
  const scale = SCALES[Math.floor(rng() * SCALES.length)];
  const palette = PALETTES[Math.floor(rng() * PALETTES.length)];
  const root = 41 + Math.floor(rng() * 12) + palette.bias;   // register bias per palette
  const r = rng();
  const rhythm = r < 0.28 ? 0 : 0.3 + rng() * 0.7;
  const tempo = 40 + Math.floor(rng() * 84);                 // 40–123, techno to dirge
  const voices = 2 + Math.floor(rng() * 6);                  // 2–7

  // the "space" — this is what makes an intimate room feel unlike a cathedral
  const reverbDecay = 2.6 + rng() * 10.5;                    // 2.6–13 s
  const reverbWet = 0.38 + rng() * 0.3;
  const delayTime = 0.16 + rng() * 0.42;
  const delayFb = 0.18 + rng() * 0.38;
  const delayWet = 0.1 + rng() * 0.32;
  const brightBias = 0.55 + rng() * 1.5;                     // dark ↔ bright base timbre
  const detune = 4 + rng() * 22;                             // chorus width, cents

  // continuous timbre — same palette never sounds twice the same
  const fatCount = 2 + Math.floor(rng() * 4);                // 2–5 unison voices
  const fatSpread = 10 + Math.floor(rng() * 42);             // detune spread, cents
  const voiceQ = 0.4 + rng() * 3.2;                          // per-voice filter resonance
  const fmHarm = (palette.harm || 1) * (0.7 + rng() * 0.7);  // FM/AM ratio jitter
  const fmIndex = (palette.index || 6) * (0.6 + rng() * 0.8);// FM depth jitter

  // per-place colour effect across the whole drone
  const fx = FXS[Math.floor(rng() * FXS.length)];
  const fxParams = { rate: 0.08 + rng() * 3, depth: 0.3 + rng() * 0.6, amt: rng() };

  // grit — distortion/edge on the drone bus. Cyberpunk places drive hard,
  // soft places stay clean. Palette can bias toward dirt.
  const drive = Math.max(0, Math.min(0.9, (palette.dirt || 0) + rng() * rng() * 0.85 - 0.12));

  // structure & motion — this is what makes forms differ, not just timbres
  const motion = [0.35, 0.55, 0.8, 1, 1.4, 2.0, 2.8][Math.floor(rng() * 7)]; // glacial ↔ lively
  const activity = 0.2 + rng() * rng() * 1.3;                // sparse ↔ dense note triggering
  const regSpread = 1 + Math.floor(rng() * 4);               // octave span across voices
  const octBase = [-2, -1, 0, 0, 1][Math.floor(rng() * 5)];  // register centre

  // some places sing a melodic arpeggio instead of pure drift
  const arp = rng() < 0.34;
  const arpRate = ["4n", "8n", "8n", "8t", "16n"][Math.floor(rng() * 5)];
  const arpLen = 3 + Math.floor(rng() * 6);
  const arpOct = 1 + Math.floor(rng() * 2);
  const arpWave = ["triangle", "sawtooth", "square", "sine"][Math.floor(rng() * 4)];
  const arpUp = rng() < 0.6;                                  // sorted motif vs free order

  // bass presence — weight vs air
  const bass = rng() < 0.55;
  const bassPulse = rng() < 0.5;
  const bassWave = ["sine", "triangle", "sawtooth", "square"][Math.floor(rng() * 4)];

  // ---- song layer: a chord progression, and a melody that follows it ----
  const seventh = rng() < 0.4;                               // triads vs 7th-chord colour
  const progLen = [1, 2, 2, 3, 3, 4, 4][Math.floor(rng() * 7)];
  const progression = [0];                                   // always open on the tonic
  for (let i = 1; i < progLen; i++) {
    let d;
    do { d = Math.floor(rng() * scale.ints.length); } while (scale.ints.length > 1 && d === progression[i - 1]);
    progression.push(d);
  }
  const chordSteps = [8, 8, 12, 16][Math.floor(rng() * 4)];  // eighth-notes each chord holds (1–2 bars)
  const leadOct = 1 + Math.floor(rng() * 2);                 // melody register above the root
  const padOct = 0;
  const leadWave = ["triangle", "sine", "square", "sawtooth", "fmsine", "pwm"][Math.floor(rng() * 6)];
  const melodyRest = 0.22 + rng() * 0.4;                     // how spacious the tune is
  // the motif: one rhythmic/contour cell, walked stepwise over the chord's tones
  // and re-voiced on every chord, so the same tune "follows the changes"
  const ladderN = (seventh ? 4 : 3) * 2;
  const cell = [];
  let cur = 0;
  for (let s = 0; s < chordSteps; s++) {
    cur = Math.max(0, Math.min(ladderN - 1, cur + (Math.floor(rng() * 5) - 2)));
    cell.push({ play: rng() > melodyRest, step: cur, oct: rng() < 0.15 ? 1 : 0, dur: rng() < 0.3 ? 2 : 1 });
  }
  cell[0].play = true; cell[0].step = 0;                     // land on the chord root each bar

  // rhythm identity
  const kit = KITS[Math.floor(rng() * KITS.length)];
  const kickSteps = [8, 12, 16][Math.floor(rng() * 3)];
  const kickHits = 1 + Math.floor(rng() * 3);
  const hatSteps = [9, 11, 13, 16][Math.floor(rng() * 4)];
  const hatHits = 3 + Math.floor(rng() * Math.max(1, Math.floor(hatSteps / 2) - 1));
  const bellSteps = [7, 10, 13][Math.floor(rng() * 3)];
  const kickNote = 33 + Math.floor(rng() * 5);               // stable low thump, not root-following
  const air = 0.03 + rng() * 0.09;
  const airHz = 300 + rng() * 900;
  const swing = rng() * 0.06;

  return { key, scale, palette, root, rhythm, tempo, voices,
    reverbDecay, reverbWet, delayTime, delayFb, delayWet, brightBias, detune,
    fatCount, fatSpread, voiceQ, fmHarm, fmIndex, fx, fxParams, drive,
    motion, activity, regSpread, octBase,
    arp, arpRate, arpLen, arpOct, arpWave, arpUp, bass, bassPulse, bassWave,
    seventh, progression, chordSteps, leadOct, padOct, leadWave, cell,
    kit, kickSteps, kickHits, hatSteps, hatHits, bellSteps, kickNote, air, airHz, swing };
}

function makeDetails(char) {
  const rng = mulberry32(hashStr(char.key + "|" + Date.now()));
  const voices = [];
  for (let i = 0; i < char.voices; i++) {
    voices.push({
      interval: Math.max(1.5, Math.min(42, (4 + rng() * 12) / char.motion)),
      octave: char.octBase + Math.floor(rng() * (char.regSpread + 1)),
      degrees: [0, 0, 0, 0].map(() => Math.floor(rng() * char.scale.ints.length)),
      attack: (2.2 + rng() * 3.2) * char.palette.atk,
      bright: rng(),
      pan: (rng() * 2 - 1) * 0.6,
    });
  }
  return {
    voices,
    kickRot: Math.floor(rng() * char.kickSteps),
    hatRot: Math.floor(rng() * char.hatSteps),
    bellRot: Math.floor(rng() * char.bellSteps),
  };
}

const dayness = (h) => 0.5 - 0.5 * Math.cos((h / 24) * Math.PI * 2);

/* ================================================================== */
/* State                                                               */
/* ================================================================== */
const state = {
  center: { lat: 40.6782, lng: -73.9442 },
  title: "Brooklyn",
  char: null,
  engine: null,
  playing: false,
  tzOffsetSec: null,           // from weather API; falls back to longitude estimate
  weather: { rain: 0, wind: 0.1, temp: 16, desc: "" },
};
state.char = makeCharacter(state.center.lat, state.center.lng);
const params = { density: 0.75, rain: 0, wind: 0.1 };

const $ = (id) => document.getElementById(id);

/* ================================================================== */
/* Audio engine                                                        */
/* ================================================================== */
/* An oscillator config for the palette, with continuous unison detune folded in. */
function oscFor(char) {
  const osc = Object.assign({}, char.palette.osc);
  if (osc.type && /^fat/.test(osc.type)) { osc.count = char.fatCount; osc.spread = char.fatSpread; }
  return osc;
}

/* Build one drone voice in the current palette's timbre.
   Returns a play(freq, dur, time) fn so percussive kinds can attack-only. */
function makeVoice(char, v, dest, track) {
  const P = char.palette;
  const env = { attack: v.attack, decay: 2, sustain: 0.72, release: 8 };
  const panner = track(new Tone.Panner(v.pan).connect(dest));
  let target = panner;
  if (P.lp) {
    const cutoff = P.lp[0] + v.bright * (P.lp[1] - P.lp[0]);
    const f = track(new Tone.Filter(cutoff, "lowpass").connect(panner));
    f.Q.value = char.voiceQ;
    target = f;
  }
  let synth, attackOnly = false;
  switch (P.kind) {
    case "fm":
      synth = new Tone.FMSynth({ harmonicity: char.fmHarm, modulationIndex: char.fmIndex, volume: P.vol,
        envelope: env, modulationEnvelope: { attack: v.attack * 0.8, decay: 1, sustain: 0.6, release: 6 } });
      break;
    case "am":
      synth = new Tone.AMSynth({ harmonicity: char.fmHarm, envelope: env, volume: P.vol });
      break;
    case "mono":
      synth = new Tone.MonoSynth({ oscillator: oscFor(char), volume: P.vol, envelope: env,
        filter: { Q: char.voiceQ, type: "lowpass", rolloff: -24 },
        filterEnvelope: { attack: v.attack * 1.2, decay: 3, sustain: 0.4, release: 8, baseFrequency: 120, octaves: 3 + v.bright * 3 } });
      break;
    case "duo":
      synth = new Tone.DuoSynth({ harmonicity: 1 + char.detune / 120, vibratoAmount: 0.15, vibratoRate: 3.5, volume: P.vol,
        voice0: { oscillator: { type: "sine" }, envelope: env },
        voice1: { oscillator: { type: "triangle" }, envelope: env } });
      break;
    case "pluck":
      synth = new Tone.PluckSynth({ attackNoise: 1, dampening: 1300 + v.bright * 3200, resonance: 0.92, volume: P.vol });
      attackOnly = true;
      break;
    case "metal":
      synth = new Tone.MetalSynth({ harmonicity: char.fmHarm, modulationIndex: char.fmIndex, volume: P.vol,
        envelope: { attack: 0.002, decay: 1.4, release: 2 }, resonance: 700 + v.bright * 3200, octaves: 1.5 });
      attackOnly = true;
      break;
    default:
      synth = new Tone.Synth({ oscillator: oscFor(char), detune: char.detune * (v.pan < 0 ? -1 : 1), envelope: env, volume: P.vol });
  }
  track(synth.connect(target));
  return (freq, dur, time) => attackOnly ? synth.triggerAttack(freq, time) : synth.triggerAttackRelease(freq, dur, time);
}

/* Optional per-place colour effect across the whole drone bus. */
function makeFX(char, track) {
  const p = char.fxParams;
  switch (char.fx) {
    case "chorus":     { const n = new Tone.Chorus(0.4 + p.rate, 3, 0.6).start(); n.wet.value = 0.45; return track(n); }
    case "phaser":     { const n = new Tone.Phaser({ frequency: 0.2 + p.rate * 0.5, octaves: 3, baseFrequency: 300 }); n.wet.value = 0.5; return track(n); }
    case "tremolo":    { const n = new Tone.Tremolo(0.4 + p.rate, 0.4 + p.depth * 0.4).start(); n.wet.value = 0.7; return track(n); }
    case "vibrato":    return track(new Tone.Vibrato(1 + p.rate * 2, 0.02 + p.amt * 0.06));
    case "autofilter": { const n = new Tone.AutoFilter({ frequency: 0.05 + p.rate * 0.2, baseFrequency: 220, octaves: 3 }).start(); n.wet.value = 0.6; return track(n); }
    case "chebyshev":  { const n = new Tone.Chebyshev(2 + Math.floor(p.amt * 3)); n.wet.value = 0.12 + p.amt * 0.18; return track(n); }
    case "bitcrush":   { const n = new Tone.BitCrusher(3 + Math.floor(p.amt * 5)); n.wet.value = 0.2 + p.amt * 0.35; return track(n); }
    default:           return null;
  }
}

function buildEngine(char, det) {
  const nodes = [];
  const loops = [];
  const track = (n) => (nodes.push(n), n);
  const chord = { offset: 0 };   // slow harmonic movement, shared by all voices

  // master chain ends in a limiter so driven / dense / bit-crushed places
  // can push hard without clipping, while clean places pass through untouched
  const out = track(new Tone.Limiter(-1).toDestination());
  const master = track(new Tone.Gain(0).connect(out));
  const filter = track(new Tone.Filter(1400, "lowpass").connect(master));
  const reverb = track(new Tone.Reverb({ decay: char.reverbDecay, wet: char.reverbWet }).connect(filter));
  const delay = track(new Tone.FeedbackDelay(char.delayTime, char.delayFb).connect(reverb));
  delay.wet.value = char.delayWet;

  // drone bus: voices → [colour fx] → [drive/distortion] → delay
  const drive = char.drive > 0.05
    ? track(new Tone.Distortion({ distortion: char.drive * 0.7, wet: 0.3 + char.drive * 0.5 }))
    : null;
  if (drive) drive.connect(delay);
  const busTail = drive || delay;
  const color = makeFX(char, track);
  if (color) color.connect(busTail);
  const voiceDest = color || busTail;

  const trigProb = () => Math.max(0.08, Math.min(0.98, 0.16 + char.activity * 0.5 + params.density * 0.3));

  det.voices.forEach((v) => {
    const play = makeVoice(char, v, voiceDest, track);
    const loop = new Tone.Loop((time) => {
      if (Math.random() > trigProb()) return;
      const deg = v.degrees[Math.floor(Math.random() * v.degrees.length)];
      let midi = char.root + char.scale.ints[deg] + 12 * v.octave + chord.offset;
      midi = Math.max(24, Math.min(100, midi));
      play(Tone.Frequency(midi, "midi"), v.interval * char.palette.len, time);
    }, v.interval);
    loop.start(Math.random() * 3);
    loops.push(loop);
  });

  /* ---- song layer: chords behind a melody, both on one progression ----
     A soft pad states each chord; the lead plays a repeating motif whose
     notes are drawn from the CURRENT chord's tones, so tune and chords
     always move together. The chord root also drives the drones + bass. */
  {
    const eighth = () => (60 / Tone.Transport.bpm.value) / 2;
    const pad = track(new Tone.PolySynth(Tone.Synth, {
      oscillator: { type: "triangle" },
      envelope: { attack: 0.6, decay: 1.5, sustain: 0.65, release: 2.6 },
      volume: -21,
    }).connect(reverb));
    const leadGain = track(new Tone.Gain(0.85).connect(delay));
    const lead = track(new Tone.Synth({
      oscillator: { type: char.leadWave },
      envelope: { attack: 0.02, decay: 0.22, sustain: 0.32, release: 0.55 },
      volume: -13,
    }).connect(leadGain));
    lead.connect(filter);                      // some dry signal so the tune reads on top

    const prog = char.progression, cell = char.cell, CS = char.chordSteps;
    let ladder = null, m = 0;
    const song = new Tone.Loop((time) => {
      const pos = m % CS;
      if (pos === 0) {                         // new chord
        const di = prog[Math.floor(m / CS) % prog.length];
        const tones = triad(char.scale, di, char.seventh);
        chord.offset = tones[0];               // drones + bass follow the changes
        ladder = tones.concat(tones.map((t) => t + 12)).sort((a, b) => a - b);
        const freqs = tones.map((t) => {
          let pm = char.root + t + 12 * char.padOct;
          while (pm > 76) pm -= 12; while (pm < 36) pm += 12;   // fold to range, keep the chord tone
          return Tone.Frequency(pm, "midi").toFrequency();
        });
        pad.triggerAttackRelease(freqs, eighth() * CS * 1.02, time);
      }
      const cs = cell[pos % cell.length];
      if (cs.play && ladder) {
        const t = ladder[Math.max(0, Math.min(ladder.length - 1, cs.step))];
        let midi = char.root + t + 12 * (char.leadOct + cs.oct);
        while (midi > 96) midi -= 12; while (midi < 48) midi += 12;  // fold, never retune
        lead.triggerAttackRelease(Tone.Frequency(midi, "midi"), eighth() * cs.dur * 0.9, time);
      }
      m++;
    }, "8n");
    song.start(0);
    loops.push(song);
  }

  /* bass — weight for places that want it; sustained pad or pulsing root */
  if (char.bass) {
    const bassSynth = track(new Tone.MonoSynth({
      oscillator: { type: char.bassWave },
      filter: { Q: 1, type: "lowpass", rolloff: -24 },
      filterEnvelope: { attack: 0.02, decay: 0.4, sustain: 0.3, release: 1.2, baseFrequency: 80, octaves: 2.5 },
      envelope: char.bassPulse
        ? { attack: 0.006, decay: 0.35, sustain: 0.2, release: 0.3 }
        : { attack: 0.8, decay: 0.5, sustain: 0.85, release: 6 },
      volume: -8,
    }).connect(filter));
    const bassMidi = () => { let b = char.root - 12 + chord.offset; while (b < 24) b += 12; while (b > 48) b -= 12; return b; };
    if (char.bassPulse) {
      const bl = new Tone.Loop((time) => {
        bassSynth.triggerAttackRelease(Tone.Frequency(bassMidi(), "midi"), "8n", time);
      }, "4n");
      bl.start(0);
      loops.push(bl);
    } else {
      const bl = new Tone.Loop((time) => {
        bassSynth.triggerAttackRelease(Tone.Frequency(bassMidi(), "midi"), "1m", time);
      }, "2m");
      bl.start(0);
      loops.push(bl);
    }
  }

  const bloom = track(new Tone.PolySynth(Tone.Synth, {
    oscillator: { type: "sine" },
    envelope: { attack: 0.5, decay: 3, sustain: 0.5, release: 9 },
    volume: -12,
  }).connect(delay));
  bloom.triggerAttackRelease([
    Tone.Frequency(char.root, "midi").toFrequency(),
    Tone.Frequency(char.root + 7, "midi").toFrequency(),
    Tone.Frequency(char.root + 12 + char.scale.ints[1], "midi").toFrequency(),
  ], 8, Tone.now() + 0.1);

  /* rain shimmer — probability follows live precipitation */
  const plink = track(new Tone.Synth({
    oscillator: { type: "sine" },
    envelope: { attack: 0.002, decay: 0.5, sustain: 0, release: 1.4 },
    volume: -20,
  }).connect(delay));
  const plinkLoop = new Tone.Loop((time) => {
    if (Math.random() < params.rain * 0.75) {
      const deg = char.scale.ints[Math.floor(Math.random() * char.scale.ints.length)];
      plink.triggerAttackRelease(Tone.Frequency(char.root + 36 + deg + chord.offset, "midi"), 0.3, time);
    }
  }, "8n");
  plinkLoop.start(0);
  loops.push(plinkLoop);

  /* air — base level is the place's own, live wind raises it */
  const windGain = track(new Tone.Gain(0).connect(reverb));
  const windFilter = track(new Tone.Filter(char.airHz, "bandpass").connect(windGain));
  windFilter.Q.value = 1.3;
  const noise = track(new Tone.Noise("pink").connect(windFilter));
  noise.volume.value = -8;
  noise.start();
  const windLfo = track(new Tone.LFO(0.05, char.airHz * 0.6, char.airHz * 1.8).connect(windFilter.frequency));
  windLfo.start();
  windGain.gain.rampTo(char.air + params.wind * 0.1, 5);

  if (char.rhythm > 0) {
    /* drums get their OWN short reverb so beats stay defined instead of
       drowning in the drone's long tail */
    const drumBus = track(new Tone.Gain(char.rhythm * 0.9).connect(filter));
    const drumVerb = track(new Tone.Reverb({ decay: 1.5 + char.rhythm * 1.4, wet: 1 }).connect(filter));
    const drumSend = track(new Tone.Gain(0.26 + char.rhythm * 0.14).connect(drumVerb));
    drumBus.connect(drumSend);

    const kick = track(new Tone.MembraneSynth({
      pitchDecay: 0.028, octaves: 4, oscillator: { type: "sine" },
      envelope: { attack: 0.001, decay: 0.34, sustain: 0 }, volume: -7,
    }).connect(drumBus));
    const hatHP = track(new Tone.Filter(6500, "highpass").connect(drumBus));
    const hat = track(new Tone.NoiseSynth({
      noise: { type: char.kit === "tickle" ? "pink" : "white" },
      envelope: { attack: 0.001, decay: 0.03, sustain: 0 }, volume: -22,
    }).connect(hatHP));
    const bell = track(new Tone.FMSynth({
      harmonicity: 5.1, modulationIndex: 12,
      envelope: { attack: 0.002, decay: 1.3, sustain: 0 }, volume: -20,
    }).connect(drumBus));
    bell.connect(drumSend);
    const rim = track(new Tone.MembraneSynth({
      pitchDecay: 0.008, octaves: 2,
      envelope: { attack: 0.001, decay: 0.09, sustain: 0 }, volume: -13,
    }).connect(drumBus));

    const kickPat = euclid(char.kickHits, char.kickSteps, det.kickRot);
    const hatPat = euclid(char.hatHits, char.hatSteps, det.hatRot);
    const bellPat = euclid(2, char.bellSteps, det.bellRot);
    const bellHit = (t) => {
      const deg = char.scale.ints[Math.floor(Math.random() * char.scale.ints.length)];
      bell.triggerAttackRelease(Tone.Frequency(char.root + 24 + deg + chord.offset, "midi"), "8n", t, 0.6);
    };
    const kf = Tone.Frequency(char.kickNote, "midi");
    let step = 0;
    const rloop = new Tone.Loop((time) => {
      const sixteenth = (60 / Tone.Transport.bpm.value) / 4;
      const t = time + (step % 2 === 1 ? char.swing * sixteenth * 2 : 0);
      const pres = 0.6 + params.density * 0.4;            // time-of-day intensity, never kills the pulse
      const k = kickPat[step % kickPat.length];
      const h = hatPat[step % hatPat.length];
      const bl = bellPat[step % bellPat.length];

      if (char.kit === "tribal") {                         // toms + rim polyrhythm, no hats
        if (k) kick.triggerAttackRelease(kf, "8n", t, 0.9);
        if (h) rim.triggerAttackRelease(Tone.Frequency(char.kickNote + 7, "midi"), "16n", t, 0.4 + Math.random() * 0.4);
        if (bl && Math.random() < 0.5 * pres) bellHit(t);
      } else if (char.kit === "dub") {                     // sparse, spacious, offbeat hats
        if (k && step % (char.kickSteps > 8 ? 2 : 1) === 0) kick.triggerAttackRelease(kf, "8n", t, 1);
        if (h && step % 2 === 1 && Math.random() < 0.6 * pres) hat.triggerAttackRelease("16n", t, 0.5);
        if (bl && Math.random() < 0.4 * pres) bellHit(t);
      } else if (char.kit === "tickle") {                  // ticks + bells, barely-there kick
        if (h && Math.random() < 0.8 * pres) hat.triggerAttackRelease("32n", t, 0.4 + Math.random() * 0.4);
        if (k && Math.random() < 0.3) kick.triggerAttackRelease(kf, "8n", t, 0.5);
        if (bl && Math.random() < 0.55 * pres) bellHit(t);
      } else if (char.kit === "house") {                   // four-on-the-floor + offbeat hats
        if (step % 4 === 0) kick.triggerAttackRelease(kf, "8n", t, 0.95);
        if (step % 4 === 2 && Math.random() < 0.85 * pres) hat.triggerAttackRelease("16n", t, 0.5 + Math.random() * 0.3);
        if (h && step % 2 === 1 && Math.random() < 0.4 * pres) hat.triggerAttackRelease("32n", t, 0.3);
        if (bl && Math.random() < 0.3 * pres) bellHit(t);
      } else if (char.kit === "broken") {                  // syncopated, ghost-note breakbeat
        if (k && Math.random() < 0.85) kick.triggerAttackRelease(kf, "8n", t, 0.9);
        if (h && Math.random() < 0.75 * pres) hat.triggerAttackRelease("16n", t, 0.3 + Math.random() * 0.5);
        if (!k && step % 4 === 2 && Math.random() < 0.5) rim.triggerAttackRelease(Tone.Frequency(char.kickNote + 12, "midi"), "16n", t, 0.5);
        if (bl && Math.random() < 0.4 * pres) bellHit(t);
      } else {                                             // pulse — steady, reliable groove
        if (k && Math.random() < 0.92) kick.triggerAttackRelease(kf, "8n", t, 0.9);
        if (h && Math.random() < 0.7 * pres + params.rain * 0.3) hat.triggerAttackRelease("16n", t, 0.5 + Math.random() * 0.3);
        if (bl && Math.random() < 0.4 * pres) bellHit(t);
      }
      step++;
    }, "16n");
    rloop.start(0);
    loops.push(rloop);
  }

  return {
    master, filter, windGain, air: char.air, brightBias: char.brightBias,
    dispose() {
      loops.forEach((l) => l.dispose());
      nodes.forEach((n) => { try { n.dispose(); } catch (e) {} });
    },
  };
}

/* ================================================================== */
/* Time, sky, conditions                                               */
/* ================================================================== */
function localHour() {
  const off = state.tzOffsetSec != null ? state.tzOffsetSec : Math.round(state.center.lng / 15) * 3600;
  const t = new Date(Date.now() + off * 1000);
  return t.getUTCHours() + t.getUTCMinutes() / 60;
}

function applySky(hour) {
  const d = dayness(hour);
  const dusk = Math.exp(-Math.pow((hour - 6.5) % 24, 2) / 3) + Math.exp(-Math.pow((hour - 19) % 24, 2) / 3);
  const rs = document.documentElement.style;
  rs.setProperty("--top", `hsl(${232 - d * 22} ${42 - d * 10}% ${7 + d * 26}%)`);
  rs.setProperty("--bottom", `hsl(${232 - d * 30 + dusk * 60} ${38 + dusk * 28}% ${12 + d * 30 + dusk * 8}%)`);
  const day = d > 0.62;
  rs.setProperty("--ink", day ? "rgba(16,20,44,0.92)" : "rgba(236,238,250,0.94)");
  rs.setProperty("--faint", day ? "rgba(16,20,44,0.5)" : "rgba(236,238,250,0.45)");
  rs.setProperty("--line", day ? "rgba(16,20,44,0.18)" : "rgba(236,238,250,0.16)");
}

function applyConditions() {
  const hour = localHour();
  const d = dayness(hour);
  params.density = 0.3 + d * 0.7;
  params.rain = state.weather.rain;
  params.wind = state.weather.wind;
  const e = state.engine;
  if (e) {
    e.filter.frequency.rampTo(Math.min(9000, (360 + d * 2200 + (state.weather.temp - 10) * 20) * e.brightBias), 2);
    e.windGain.gain.rampTo(e.air + state.weather.wind * 0.1, 3);
  }
  applySky(hour);
  const hh = Math.floor(hour), mm = Math.floor((hour - hh) * 60);
  const cl = cellOf(state.center.lat, state.center.lng);
  $("coords").textContent = `${cl.lat.toFixed(3)}°  ${cl.lng.toFixed(3)}°  ·  local ${String(hh).padStart(2, "0")}:${String(mm).padStart(2, "0")}`;
}

/* ================================================================== */
/* Live data                                                           */
/* ================================================================== */
const WCODE = { 0: "clear", 1: "mostly clear", 2: "partly cloudy", 3: "overcast", 45: "fog", 48: "fog", 51: "drizzle", 53: "drizzle", 55: "drizzle", 61: "light rain", 63: "rain", 65: "heavy rain", 66: "freezing rain", 67: "freezing rain", 71: "light snow", 73: "snow", 75: "heavy snow", 77: "snow", 80: "showers", 81: "showers", 82: "heavy showers", 85: "snow showers", 86: "snow showers", 95: "thunderstorm", 96: "thunderstorm", 99: "thunderstorm" };

async function fetchWeather() {
  try {
    const { lat, lng } = state.center;
    const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m,precipitation,wind_speed_10m,weather_code&timezone=auto`);
    const j = await r.json();
    state.tzOffsetSec = j.utc_offset_seconds;
    const c = j.current;
    const snowish = c.weather_code >= 71 && c.weather_code <= 86;
    state.weather = {
      temp: c.temperature_2m,
      rain: Math.min((c.precipitation || 0) / 3, 1) * (snowish ? 0.5 : 1),
      wind: Math.min((c.wind_speed_10m || 0) / 40, 1),
      desc: WCODE[c.weather_code] || "",
    };
    $("weather").textContent = `${Math.round(c.temperature_2m)}°C · ${state.weather.desc} · wind ${Math.round(c.wind_speed_10m)} km/h`;
    applyConditions();
  } catch (e) { /* offline is fine — the sound still plays */ }
}

async function reverseTitle() {
  try {
    const { lat, lng } = state.center;
    const r = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lng}&localityLanguage=en`);
    const j = await r.json();
    const t = j.city || j.locality || j.principalSubdivision || j.countryName;
    if (t) { state.title = t; $("title").textContent = t; }
  } catch (e) {}
}

/* ================================================================== */
/* Rendering                                                           */
/* ================================================================== */
function renderCharacter() {
  const c = state.char;
  const label = c.rhythm === 0 ? "pure drone" : c.rhythm < 0.55 ? "faint pulse" : "steady groove";
  $("meta").textContent = `${c.palette.mood} · ${c.scale.name} · ${label}` + (c.rhythm > 0 ? ` · ${c.tempo} bpm` : "");
  $("title").textContent = state.title;
  const rings = $("rings");
  rings.innerHTML = "";
  for (let i = 0; i < c.voices; i++) {
    const el = document.createElement("span");
    el.className = "ring";
    el.style.inset = (i * (115 / c.voices)) + "px";
    el.style.setProperty("--dur", (7 + i * 3.3) + "s");
    rings.appendChild(el);
  }
  document.documentElement.style.setProperty("--beat", (60 / c.tempo) + "s");
  document.body.classList.toggle("grooving", c.rhythm > 0);
}

/* ================================================================== */
/* Travel                                                              */
/* ================================================================== */
function travel(pos, title) {
  state.center = pos;
  state.tzOffsetSec = null; // re-estimate until weather returns the real offset
  if (title) { state.title = title; } else { state.title = pos.lat.toFixed(3) + "°, " + pos.lng.toFixed(3) + "°"; reverseTitle(); }
  const nc = makeCharacter(pos.lat, pos.lng);
  const changed = nc.key !== state.char.key;
  state.char = nc;
  $("title").classList.add("fading");
  setTimeout(() => $("title").classList.remove("fading"), 1200);
  renderCharacter();
  applyConditions();
  fetchWeather();
  if (changed && state.engine) {
    const old = state.engine;
    old.master.gain.rampTo(0, 2.6);
    setTimeout(() => old.dispose(), 3200);
    Tone.Transport.bpm.rampTo(nc.tempo, 2);
    const eng = buildEngine(nc, makeDetails(nc));
    state.engine = eng;
    eng.master.gain.rampTo(0.9, 3.2);
  }
}

/* ================================================================== */
/* Controls                                                            */
/* ================================================================== */
$("circle").addEventListener("click", async () => {
  if (state.playing) {
    const e = state.engine;
    if (e) { e.master.gain.rampTo(0, 1.6); setTimeout(() => e.dispose(), 2000); }
    state.engine = null;
    state.playing = false;
    document.body.classList.remove("playing");
    $("hint").textContent = "tap to listen";
    return;
  }
  try {
    await Tone.start();
    Tone.Transport.bpm.value = state.char.tempo;
    if (Tone.Transport.state !== "started") Tone.Transport.start();
    const eng = buildEngine(state.char, makeDetails(state.char));
    state.engine = eng;
    eng.master.gain.rampTo(0.95, 1.2);
    state.playing = true;
    document.body.classList.add("playing");
    $("hint").textContent = "tap to stop";
    applyConditions();
  } catch (err) {
    $("msg").textContent = "audio error: " + err.message;
  }
});

function locate(silent) {
  if (!navigator.geolocation) { if (!silent) $("msg").textContent = "geolocation unavailable"; return; }
  if (!silent) $("msg").textContent = "locating…";
  navigator.geolocation.getCurrentPosition(
    (p) => { $("msg").textContent = ""; travel({ lat: p.coords.latitude, lng: p.coords.longitude }); },
    () => { if (!silent) $("msg").textContent = "location permission denied · try searching instead"; },
    { timeout: 8000 }
  );
}
$("locate").addEventListener("click", () => locate(false));

/* search — any place on earth via Open-Meteo geocoding */
let searchTimer = null;
$("q").addEventListener("input", (e) => {
  clearTimeout(searchTimer);
  const q = e.target.value.trim();
  if (q.length < 2) { $("results").classList.remove("open"); return; }
  searchTimer = setTimeout(async () => {
    try {
      const r = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=6&language=en&format=json`);
      const j = await r.json();
      const box = $("results");
      box.innerHTML = "";
      (j.results || []).forEach((res) => {
        const b = document.createElement("button");
        const sub = [res.admin1, res.country].filter(Boolean).join(", ");
        b.innerHTML = res.name + '<span class="sub">' + sub + "</span>";
        b.addEventListener("click", () => {
          $("q").value = "";
          box.classList.remove("open");
          travel({ lat: res.latitude, lng: res.longitude }, res.name);
        });
        box.appendChild(b);
      });
      box.classList.toggle("open", (j.results || []).length > 0);
    } catch (err) {}
  }, 300);
});
document.addEventListener("click", (e) => {
  if (!e.target.closest(".searchrow")) $("results").classList.remove("open");
});

/* ================================================================== */
/* Boot                                                                */
/* ================================================================== */
renderCharacter();
applyConditions();
fetchWeather();
reverseTitle();
locate(true);                       // default to the real current location
setInterval(applyConditions, 20000);   // real clock drives the sound
setInterval(fetchWeather, 10 * 60 * 1000); // live weather refresh
</script>
</body>
</html>
