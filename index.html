<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Fieldtone — a sound for every place and time</title>
<meta name="description" content="A continuous, generative ambient sound unique to every location and moment on Earth.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --top: hsl(232 42% 7%);
    --bottom: hsl(232 38% 12%);
    --ink: rgba(236,238,250,0.94);
    --faint: rgba(236,238,250,0.45);
    --line: rgba(236,238,250,0.16);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; }
  body {
    background: linear-gradient(180deg, var(--top) 0%, var(--bottom) 100%);
    background-attachment: fixed;
    transition: background 2s ease;
    color: var(--ink);
    font-family: 'Space Grotesk', sans-serif;
    display: grid; place-items: center;
    min-height: 100dvh;
    padding: 0 20px;
    -webkit-tap-highlight-color: transparent;
  }
  .mono { font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.14em; text-transform: uppercase; }
  /* top — the location name IS the search field, with a locate button at its right */
  .top { position: fixed; top: max(28px, env(safe-area-inset-top)); left: 50%; transform: translateX(-50%); width: min(560px, calc(100% - 40px)); z-index: 5; }
  .searchbar { position: relative; display: flex; align-items: center; border-bottom: 1px solid transparent; transition: border-color 0.4s; }
  .searchbar:focus-within { border-bottom-color: var(--line); }
  #q {
    width: 100%; background: transparent; border: none;
    color: var(--ink); font-family: 'Space Grotesk', sans-serif; font-weight: 300;
    font-size: clamp(23px, 7vw, 34px); letter-spacing: 0.02em; text-align: center;
    padding: 6px 46px; transition: opacity 1.2s;
  }
  #q:focus-visible { outline: none; }
  #q.fading { opacity: 0.3; }
  #q::placeholder { color: var(--ink); opacity: 0.32; font-weight: 300; }
  #locate {
    position: absolute; right: 0; top: 50%; transform: translateY(-50%);
    width: 38px; height: 38px; display: flex; align-items: center; justify-content: center;
    background: transparent; border: 1px solid var(--line); border-radius: 999px;
    color: var(--ink); font-size: 15px; cursor: pointer;
  }
  #results {
    position: absolute; top: 100%; left: 0; right: 0; z-index: 5; margin-top: 8px;
    background: var(--top); border: 1px solid var(--line); border-radius: 8px; overflow: hidden;
    text-align: left; display: none;
  }
  #results.open { display: block; }
  #results button {
    display: block; width: 100%; text-align: left; background: transparent; border: none;
    color: var(--ink); font-family: 'Space Grotesk', sans-serif; font-size: 15px; padding: 12px 14px; cursor: pointer;
  }
  #results button:hover, #results button:focus-visible { background: rgba(236,238,250,0.06); }
  #results button .sub { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--faint); margin-left: 10px; }

  /* middle — the visual, vertically centred in the viewport */
  .stage { display: flex; flex-direction: column; align-items: center; justify-content: center; }
  #circle { position: relative; width: min(230px, 62vw); height: min(230px, 62vw); margin: 0 0 12px; background: transparent; border: none; cursor: pointer; }
  #circle .ring {
    position: absolute; border-radius: 50%; border: 1px solid var(--line);
    opacity: 0.5; transition: opacity 1s;
  }
  body.playing #circle .ring { opacity: 1; animation: breathe var(--dur, 9s) ease-in-out infinite; }
  #dot {
    position: absolute; top: 50%; left: 50%; width: 8px; height: 8px; margin: -4px 0 0 -4px;
    border-radius: 50%; background: var(--ink);
  }
  body.playing.grooving #dot { animation: pulse var(--beat, 1s) ease-out infinite; }
  #hint { font-size: 9px; color: var(--faint); }

  /* bottom — coordinates · time · weather, on one line */
  .foot { position: fixed; bottom: max(20px, env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); width: min(560px, calc(100% - 40px)); display: flex; flex-direction: column; align-items: center; gap: 5px; text-align: center; }
  #info { font-size: 9px; letter-spacing: 0.12em; color: var(--faint); min-height: 12px; }
  #msg { font-size: 9px; color: var(--faint); min-height: 12px; }
  button:focus-visible, input:focus-visible { outline: 2px solid currentColor; outline-offset: 3px; }
  @keyframes breathe { 0%,100% { transform: scale(1); opacity: 0.55; } 50% { transform: scale(1.12); opacity: 0.95; } }
  @keyframes pulse { 0%,100% { transform: scale(1); } 12% { transform: scale(1.35); } }
  @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
</style>
</head>
<body>
  <header class="top">
    <div class="searchbar">
      <input id="q" autocomplete="off" spellcheck="false" placeholder="search any place…" aria-label="Current location — type to search any place on Earth">
      <button id="locate" aria-label="Use my location">◎</button>
    </div>
    <div id="results" role="listbox"></div>
  </header>

  <main class="stage">
    <button id="circle" aria-label="Play or stop the sound">
      <span id="rings"></span>
      <span id="dot"></span>
    </button>
    <div id="hint" class="mono">tap to listen</div>
  </main>

  <footer class="foot">
    <div id="info" class="mono"></div>
    <div id="msg" class="mono"></div>
  </footer>

<script src="https://unpkg.com/tone@14.8.49/build/Tone.js"></script>
<script>
/* ================================================================== */
/* Seeding                                                             */
/* ================================================================== */
const hashStr = (s) => { let h = 2166136261 >>> 0; for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); } return h >>> 0; };
const mulberry32 = (a) => () => { a |= 0; a = (a + 0x6d2b79f5) | 0; let t = Math.imul(a ^ (a >>> 15), 1 | a); t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t; return ((t ^ (t >>> 14)) >>> 0) / 4294967296; };
const euclid = (hits, steps, rot = 0) => { const p = []; let b = 0; for (let i = 0; i < steps; i++) { b += hits; if (b >= steps) { b -= steps; p.push(1); } else p.push(0); } return p.map((_, i) => p[(i + rot) % steps]); };
/* Diatonic chord built by stacking thirds within the scale, so chord tones
   and melody always share the same key. Returns semitone offsets from the root. */
const triad = (scale, di, seventh) => {
  const L = scale.ints.length;
  const steps = seventh ? [0, 2, 4, 6] : [0, 2, 4];
  return steps.map((s) => { const j = di + s; return scale.ints[((j % L) + L) % L] + 12 * Math.floor(j / L); });
};

/* Per-place colour effect inserted across the drone bus — a big multiplier on feel.
   "none" weighted twice so roughly a third of places stay uncoloured. */
const FXS = ["none", "none", "chorus", "phaser", "tremolo", "vibrato", "autofilter", "chebyshev", "bitcrush"];

/* Place archetypes — the biggest driver of "wildly different". Each reshapes the
   whole arrangement: tempo, whether there's a beat, which drum kit, swing amount,
   lo-fi grit, reverb size, how loud the drones sit, vinyl crackle, chord richness.
   Weighted (w) toward lo-fi / beat-driven feels. */
const ARCHETYPES = [
  { id: "lofi",     w: 3, tempo: [68, 92],   beat: 1.0,  kit: "boombap", swing: [0.12, 0.24], lofi: [0.55, 0.95], verb: [1.4, 3.5], drone: 0.55, crackle: 0.85, seventh: 0.9 },
  { id: "triphop",  w: 2, tempo: [78, 100],  beat: 0.95, kit: "boombap", swing: [0.06, 0.16], lofi: [0.40, 0.80], verb: [2.5, 6.0], drone: 0.60, crackle: 0.60, seventh: 0.7 },
  { id: "jazzy",    w: 2, tempo: [76, 108],  beat: 0.85, kit: "brush",   swing: [0.14, 0.26], lofi: [0.30, 0.70], verb: [2.0, 4.5], drone: 0.50, crackle: 0.50, seventh: 0.95 },
  { id: "dub",      w: 2, tempo: [68, 86],   beat: 0.80, kit: "dub",     swing: [0.05, 0.14], lofi: [0.30, 0.70], verb: [4.0, 9.0], drone: 0.70, crackle: 0.35, seventh: 0.5 },
  { id: "house",    w: 1, tempo: [118, 126], beat: 1.0,  kit: "four",    swing: [0.03, 0.12], lofi: [0.10, 0.45], verb: [2.0, 4.5], drone: 0.45, crackle: 0.15, seventh: 0.55 },
  { id: "techno",   w: 1, tempo: [124, 134], beat: 1.0,  kit: "four",    swing: [0.00, 0.05], lofi: [0.15, 0.50], verb: [1.8, 4.0], drone: 0.50, crackle: 0.10, seventh: 0.3 },
  { id: "footwork", w: 1, tempo: [128, 152], beat: 1.0,  kit: "four",    swing: [0.00, 0.06], lofi: [0.20, 0.60], verb: [1.5, 4.0], drone: 0.40, crackle: 0.20, seventh: 0.4 },
  { id: "cinematic",w: 1, tempo: [54, 80],   beat: 0.35, kit: "boombap", swing: [0.02, 0.10], lofi: [0.10, 0.50], verb: [6.0, 12],  drone: 0.90, crackle: 0.25, seventh: 0.6 },
  { id: "ambient",  w: 2, tempo: [50, 78],   beat: 0.0,  kit: "none",    swing: [0.00, 0.02], lofi: [0.00, 0.35], verb: [6.0, 13],  drone: 1.00, crackle: 0.10, seventh: 0.4 },
  { id: "drone",    w: 1, tempo: [44, 64],   beat: 0.0,  kit: "none",    swing: [0.00, 0.02], lofi: [0.00, 0.40], verb: [7.0, 13],  drone: 1.00, crackle: 0.10, seventh: 0.3 },
];
const ARCH_POOL = ARCHETYPES.flatMap((a) => Array(a.w).fill(a));
const rangePick = (rng, a) => a[0] + rng() * (a[1] - a[0]);

/* Procedural scale — a subset of the 12 chromatic notes, seeded per place, so
   there are thousands of possibilities. Anchors (root, fifth, fourth, thirds…)
   are likely, keeping it musical, but the remainder is wide open. */
function genScale(rng) {
  const size = 5 + Math.floor(rng() * 4);              // 5–8 notes
  const set = new Set([0]);                            // root always present
  const anchors = [7, 5, 4, 3, 9, 10, 2];
  for (const a of anchors) { if (set.size < size && rng() < 0.5) set.add(a); }
  while (set.size < size) set.add(1 + Math.floor(rng() * 11));
  return { ints: Array.from(set).sort((a, b) => a - b) };
}

/* The melody motif: a rhythmic/contour cell walked over the chord tones.
   Regenerated on evolution so the tune changes while staying in key. */
function genCell(seventh, chordSteps, melodyRest, rng) {
  const ladderN = (seventh ? 4 : 3) * 2;
  const cell = [];
  let cur = 0;
  for (let s = 0; s < chordSteps; s++) {
    cur = Math.max(0, Math.min(ladderN - 1, cur + (Math.floor(rng() * 5) - 2)));
    const dr = rng(); const dur = dr < 0.4 ? 1 : dr < 0.75 ? 2 : dr < 0.92 ? 3 : 4;
    cell.push({ play: rng() > melodyRest, step: cur, oct: rng() < 0.12 ? 1 : 0, dur });
  }
  cell[0].play = true; cell[0].step = 0;             // land on the chord root each bar
  return cell;
}

/* A 16-step kit pattern (kick / snare / hat), with per-place variation. */
function genDrums(kit, rng) {
  const K = Array(16).fill(0), S = Array(16).fill(0), H = Array(16).fill(0);
  if (kit === "boombap") {                              // lo-fi hip-hop: backbeat + syncopated kick
    K[0] = 1; if (rng() < 0.6) K[10] = 1; if (rng() < 0.5) K[7] = 1; if (rng() < 0.35) K[3] = 1; if (rng() < 0.3) K[14] = 1;
    S[4] = 1; S[12] = 1;
    for (let i = 0; i < 16; i += 2) H[i] = 1;
    if (rng() < 0.5) for (let i = 3; i < 16; i += 4) H[i] = 1;
  } else if (kit === "four") {                          // four-on-the-floor
    K[0] = K[4] = K[8] = K[12] = 1;
    S[4] = S[12] = 1;
    for (let i = 2; i < 16; i += 4) H[i] = 1;
    if (rng() < 0.6) for (let i = 0; i < 16; i += 2) H[i] = 1;
  } else if (kit === "dub") {                           // sparse, half-time snare
    K[0] = 1; if (rng() < 0.5) K[10] = 1;
    S[8] = 1;
    if (rng() < 0.6) H[6] = 1; if (rng() < 0.6) H[14] = 1;
  } else if (kit === "brush") {                         // jazzy, snare on the backbeat, steady ride
    K[0] = 1; if (rng() < 0.6) K[8] = 1; if (rng() < 0.3) K[11] = 1;
    S[4] = S[12] = 1;
    for (let i = 0; i < 16; i += 2) H[i] = 1;
  }
  return { K, S, H };
}

const CELL = 0.001;
const cellOf = (lat, lng) => ({ lat: Math.round(lat / CELL) * CELL, lng: Math.round(lng / CELL) * CELL });

function makeCharacter(lat, lng) {
  const c = cellOf(lat, lng);
  const key = c.lat.toFixed(3) + "," + c.lng.toFixed(3);
  const rng = mulberry32(hashStr(key));
  const archetype = ARCH_POOL[Math.floor(rng() * ARCH_POOL.length)];
  const scale = genScale(rng);                               // one of thousands
  const palette = PALETTES[Math.floor(rng() * PALETTES.length)];
  const root = 41 + Math.floor(rng() * 12) + palette.bias;   // register bias per palette
  const tempo = Math.round(rangePick(rng, archetype.tempo));
  const beat = archetype.beat;                               // beat presence/level from the archetype
  const rhythm = beat;                                       // drives the grooving dot in the UI
  const voices = 2 + Math.floor(rng() * 5);                  // 2–6
  const lofi = rangePick(rng, archetype.lofi);               // grit / dust amount
  const crackle = Math.min(1, archetype.crackle * (0.5 + rng()));
  const droneLevel = archetype.drone;                        // how loud the ambient bed sits
  const kit = archetype.kit;
  const drums = genDrums(kit, rng);

  // the "space" — the archetype sets the room, from intimate to cathedral
  const reverbDecay = rangePick(rng, archetype.verb);
  const reverbWet = 0.38 + rng() * 0.3;
  const delayTime = 0.16 + rng() * 0.42;
  const delayFb = 0.18 + rng() * 0.38;
  const delayWet = 0.1 + rng() * 0.32;
  const brightBias = 0.55 + rng() * 1.5;                     // dark ↔ bright base timbre
  const detune = 4 + rng() * 22;                             // chorus width, cents

  // continuous timbre — same palette never sounds twice the same
  const fatCount = 2 + Math.floor(rng() * 4);                // 2–5 unison voices
  const fatSpread = 10 + Math.floor(rng() * 42);             // detune spread, cents
  const voiceQ = 0.4 + rng() * 3.2;                          // per-voice filter resonance
  const fmHarm = (palette.harm || 1) * (0.7 + rng() * 0.7);  // FM/AM ratio jitter
  const fmIndex = (palette.index || 6) * (0.6 + rng() * 0.8);// FM depth jitter

  // per-place colour effect across the whole drone
  const fx = FXS[Math.floor(rng() * FXS.length)];
  const fxParams = { rate: 0.08 + rng() * 3, depth: 0.3 + rng() * 0.6, amt: rng() };

  // grit — distortion/edge on the drone bus. Cyberpunk places drive hard,
  // soft places stay clean. Palette can bias toward dirt.
  const drive = Math.max(0, Math.min(0.9, (palette.dirt || 0) + rng() * rng() * 0.85 - 0.12));

  // structure & motion — this is what makes forms differ, not just timbres
  const motion = [0.35, 0.55, 0.8, 1, 1.4, 2.0, 2.8][Math.floor(rng() * 7)]; // glacial ↔ lively
  const activity = 0.15 + rng() * rng() * 0.9;               // sparse ↔ dense (kept calm — it's a background wash)
  const regSpread = 1 + Math.floor(rng() * 4);               // octave span across voices
  const octBase = [-2, -1, 0, 0, 1][Math.floor(rng() * 5)];  // register centre

  // some places sing a melodic arpeggio instead of pure drift
  const arp = rng() < 0.34;
  const arpRate = ["4n", "8n", "8n", "8t", "16n"][Math.floor(rng() * 5)];
  const arpLen = 3 + Math.floor(rng() * 6);
  const arpOct = 1 + Math.floor(rng() * 2);
  const arpWave = ["triangle", "sawtooth", "square", "sine"][Math.floor(rng() * 4)];
  const arpUp = rng() < 0.6;                                  // sorted motif vs free order

  // bass presence — weight vs air
  const bass = rng() < 0.55;
  const bassPulse = rng() < 0.5;
  const bassWave = ["sine", "triangle", "sawtooth", "square"][Math.floor(rng() * 4)];

  // ---- song layer: a chord progression, and a melody that follows it ----
  const seventh = rng() < archetype.seventh;                 // jazzier archetypes use 7th chords
  const progLen = [1, 2, 2, 3, 3, 4, 4][Math.floor(rng() * 7)];
  const progression = [0];                                   // always open on the tonic
  for (let i = 1; i < progLen; i++) {
    let d;
    do { d = Math.floor(rng() * scale.ints.length); } while (scale.ints.length > 1 && d === progression[i - 1]);
    progression.push(d);
  }
  const chordSteps = [8, 8, 12, 16][Math.floor(rng() * 4)];  // eighth-notes each chord holds (1–2 bars)
  const leadOct = 1 + Math.floor(rng() * 2);                 // melody register above the root
  const padOct = 0;
  const leadWave = ["triangle", "sine", "square", "sawtooth", "fmsine", "pwm"][Math.floor(rng() * 6)];
  const melodyRest = 0.55 + rng() * 0.32;                    // sparse: only 13–45% of steps sound
  const cell = genCell(seventh, chordSteps, melodyRest, rng);

  // lead sits INSIDE the atmosphere — mostly wet, its own delay + reverb send,
  // amounts unique to the place (and modulated by time of day at play)
  const leadVerbAmt = 0.4 + rng() * 0.55;
  const leadDelayTime = 0.16 + rng() * 0.5;
  const leadDelayFb = 0.2 + rng() * 0.45;
  const leadDelayWet = 0.32 + rng() * 0.55;
  const leadDry = 0.08 + rng() * 0.12;                       // just a whisper of dry signal

  // bassline — a low line that walks the chord roots/fifths, blended low
  const bassHits = 2 + Math.floor(rng() * 4);                // 2–5 notes per bar
  const bassStyle = ["root", "root", "octave", "fifth", "walk"][Math.floor(rng() * 5)];
  const bassVerb = 0.08 + rng() * 0.26;

  // rhythm identity
  const kickNote = 33 + Math.floor(rng() * 5);               // stable low thump, not root-following
  const air = 0.03 + rng() * 0.09;
  const airHz = 300 + rng() * 900;
  const swing = rangePick(rng, archetype.swing);

  return { key, scale, palette, root, rhythm, tempo, voices,
    archetype, beat, lofi, crackle, droneLevel,
    reverbDecay, reverbWet, delayTime, delayFb, delayWet, brightBias, detune,
    fatCount, fatSpread, voiceQ, fmHarm, fmIndex, fx, fxParams, drive,
    motion, activity, regSpread, octBase,
    arp, arpRate, arpLen, arpOct, arpWave, arpUp, bassWave,
    seventh, progression, chordSteps, leadOct, padOct, leadWave, cell, melodyRest,
    leadVerbAmt, leadDelayTime, leadDelayFb, leadDelayWet, leadDry,
    bassHits, bassStyle, bassVerb,
    kit, drums, kickNote, air, airHz, swing };
}

function makeDetails(char) {
  const rng = mulberry32(hashStr(char.key + "|" + Date.now()));
  const voices = [];
  for (let i = 0; i < char.voices; i++) {
    voices.push({
      interval: Math.max(3, Math.min(46, (6 + rng() * 14) / char.motion)),
      octave: char.octBase + Math.floor(rng() * (char.regSpread + 1)),
      degrees: [0, 0, 0, 0].map(() => Math.floor(rng() * char.scale.ints.length)),
      attack: (2.2 + rng() * 3.2) * char.palette.atk,
      bright: rng(),
      pan: (rng() * 2 - 1) * 0.6,
    });
  }
  return { voices };
}

const dayness = (h) => 0.5 - 0.5 * Math.cos((h / 24) * Math.PI * 2);

/* ================================================================== */
/* Audio engine                                                        */
/* ================================================================== */
/* An oscillator config for the palette, with continuous unison detune folded in. */
function oscFor(char) {
  const osc = Object.assign({}, char.palette.osc);
  if (osc.type && /^fat/.test(osc.type)) { osc.count = char.fatCount; osc.spread = char.fatSpread; }
  return osc;
}

/* Build one drone voice in the current palette's timbre.
   Returns a play(freq, dur, time) fn so percussive kinds can attack-only. */
function makeVoice(char, v, dest, track) {
  const P = char.palette;
  const env = { attack: v.attack, decay: 2, sustain: 0.72, release: 8 };
  const panner = track(new Tone.Panner(v.pan).connect(dest));
  let target = panner;
  if (P.lp) {
    const cutoff = P.lp[0] + v.bright * (P.lp[1] - P.lp[0]);
    const f = track(new Tone.Filter(cutoff, "lowpass").connect(panner));
    f.Q.value = char.voiceQ;
    target = f;
  }
  let synth, attackOnly = false;
  switch (P.kind) {
    case "fm":
      synth = new Tone.FMSynth({ harmonicity: char.fmHarm, modulationIndex: char.fmIndex, volume: P.vol,
        envelope: env, modulationEnvelope: { attack: v.attack * 0.8, decay: 1, sustain: 0.6, release: 6 } });
      break;
    case "am":
      synth = new Tone.AMSynth({ harmonicity: char.fmHarm, envelope: env, volume: P.vol });
      break;
    case "mono":
      synth = new Tone.MonoSynth({ oscillator: oscFor(char), volume: P.vol, envelope: env,
        filter: { Q: char.voiceQ, type: "lowpass", rolloff: -24 },
        filterEnvelope: { attack: v.attack * 1.2, decay: 3, sustain: 0.4, release: 8, baseFrequency: 120, octaves: 3 + v.bright * 3 } });
      break;
    case "duo":
      synth = new Tone.DuoSynth({ harmonicity: 1 + char.detune / 120, vibratoAmount: 0.15, vibratoRate: 3.5, volume: P.vol,
        voice0: { oscillator: { type: "sine" }, envelope: env },
        voice1: { oscillator: { type: "triangle" }, envelope: env } });
      break;
    case "pluck":
      synth = new Tone.PluckSynth({ attackNoise: 1, dampening: 1300 + v.bright * 3200, resonance: 0.92, volume: P.vol });
      attackOnly = true;
      break;
    case "metal":
      synth = new Tone.MetalSynth({ harmonicity: char.fmHarm, modulationIndex: char.fmIndex, volume: P.vol,
        envelope: { attack: 0.002, decay: 1.4, release: 2 }, resonance: 700 + v.bright * 3200, octaves: 1.5 });
      attackOnly = true;
      break;
    default:
      synth = new Tone.Synth({ oscillator: oscFor(char), detune: char.detune * (v.pan < 0 ? -1 : 1), envelope: env, volume: P.vol });
  }
  track(synth.connect(target));
  return (freq, dur, time) => attackOnly ? synth.triggerAttack(freq, time) : synth.triggerAttackRelease(freq, dur, time);
}

/* Optional per-place colour effect across the whole drone bus. */
function makeFX(char, track) {
  const p = char.fxParams;
  switch (char.fx) {
    case "chorus":     { const n = new Tone.Chorus(0.4 + p.rate, 3, 0.6).start(); n.wet.value = 0.45; return track(n); }
    case "phaser":     { const n = new Tone.Phaser({ frequency: 0.2 + p.rate * 0.5, octaves: 3, baseFrequency: 300 }); n.wet.value = 0.5; return track(n); }
    case "tremolo":    { const n = new Tone.Tremolo(0.4 + p.rate, 0.4 + p.depth * 0.4).start(); n.wet.value = 0.7; return track(n); }
    case "vibrato":    return track(new Tone.Vibrato(1 + p.rate * 2, 0.02 + p.amt * 0.06));
    case "autofilter": { const n = new Tone.AutoFilter({ frequency: 0.05 + p.rate * 0.2, baseFrequency: 220, octaves: 3 }).start(); n.wet.value = 0.6; return track(n); }
    case "chebyshev":  { const n = new Tone.Chebyshev(2 + Math.floor(p.amt * 3)); n.wet.value = 0.12 + p.amt * 0.18; return track(n); }
    case "bitcrush":   { const n = new Tone.BitCrusher(3 + Math.floor(p.amt * 5)); n.wet.value = 0.2 + p.amt * 0.35; return track(n); }
    default:           return null;
  }
}

function buildEngine(char, det) {
  const nodes = [];
  const loops = [];
  const track = (n) => (nodes.push(n), n);
  const chord = { offset: 0 };   // current chord root offset, shared by all voices
  const harmony = { tones: [0] };// current chord's tones, read by the bassline
  let leadVerbNode = null;       // lead reverb send, modulated by time of day
  // live, mutable arrangement — evolve() swaps these so the piece moves over time
  let songCell = char.cell, songProg = char.progression, songDrums = char.drums;

  // master chain ends in a limiter so driven / dense / bit-crushed places can push
  // hard without clipping. Lo-fi places get tape wow/flutter across the whole mix.
  const out = track(new Tone.Limiter(-1).toDestination());
  const master = track(new Tone.Gain(0).connect(out));
  const wow = char.lofi > 0.25
    ? track(new Tone.Vibrato(4 + char.lofi * 3, Math.min(0.06, char.lofi * 0.04)).connect(master))
    : null;
  const filter = track(new Tone.Filter(1400, "lowpass").connect(wow || master));
  const reverb = track(new Tone.Reverb({ decay: char.reverbDecay, wet: char.reverbWet }).connect(filter));
  const delay = track(new Tone.FeedbackDelay(char.delayTime, char.delayFb).connect(reverb));
  delay.wet.value = char.delayWet;

  // drone bus: voices → [colour fx] → [drive] → droneGain (archetype level) → delay
  const droneGain = track(new Tone.Gain(char.droneLevel).connect(delay));
  const drive = char.drive > 0.05
    ? track(new Tone.Distortion({ distortion: char.drive * 0.7, wet: 0.3 + char.drive * 0.5 }))
    : null;
  if (drive) drive.connect(droneGain);
  const busTail = drive || droneGain;
  const color = makeFX(char, track);
  if (color) color.connect(busTail);
  const voiceDest = color || busTail;

  const trigProb = () => Math.max(0.05, Math.min(0.6, 0.08 + char.activity * 0.4 + params.density * 0.22));

  det.voices.forEach((v) => {
    const play = makeVoice(char, v, voiceDest, track);
    const loop = new Tone.Loop((time) => {
      if (Math.random() > trigProb()) return;
      const deg = v.degrees[Math.floor(Math.random() * v.degrees.length)];
      let midi = char.root + char.scale.ints[deg] + 12 * v.octave + chord.offset;
      midi = Math.max(24, Math.min(100, midi));
      play(Tone.Frequency(midi, "midi"), v.interval * char.palette.len, time);
    }, v.interval);
    loop.start(Math.random() * 3);
    loops.push(loop);
  });

  /* ---- song layer: chords behind a melody, both on one progression ----
     A soft pad states each chord; the lead plays a repeating motif whose
     notes are drawn from the CURRENT chord's tones, so tune and chords
     always move together. The chord root also drives the drones + bass. */
  {
    const eighth = () => (60 / Tone.Transport.bpm.value) / 2;
    const pad = track(new Tone.PolySynth(Tone.Synth, {
      oscillator: { type: "triangle" },
      envelope: { attack: 0.8, decay: 1.8, sustain: 0.6, release: 3 },
      volume: -22,
    }).connect(reverb));

    // lead lives inside the space: its own delay → shared reverb, a reverb send,
    // and only a whisper of dry signal so it blends rather than sits on top
    const leadDelay = track(new Tone.FeedbackDelay(char.leadDelayTime, char.leadDelayFb));
    leadDelay.wet.value = char.leadDelayWet;
    leadDelay.connect(reverb);
    const leadVerb = track(new Tone.Gain(char.leadVerbAmt).connect(reverb));
    leadVerbNode = leadVerb;
    const leadDry = track(new Tone.Gain(char.leadDry).connect(filter));
    const lead = track(new Tone.Synth({
      oscillator: { type: char.leadWave },
      envelope: { attack: 0.06, decay: 0.4, sustain: 0.4, release: 1.6 },
      volume: -22,
    }));
    lead.connect(leadDelay); lead.connect(leadVerb); lead.connect(leadDry);

    const CS = char.chordSteps;
    let ladder = null, m = 0, hold = 0;
    const song = new Tone.Loop((time) => {
      const pos = m % CS;
      if (pos === 0) {                         // new chord
        const di = songProg[Math.floor(m / CS) % songProg.length];
        const tones = triad(char.scale, di, char.seventh);
        chord.offset = tones[0];               // drones + bass follow the changes
        harmony.tones = tones;
        ladder = tones.concat(tones.map((t) => t + 12)).sort((a, b) => a - b);
        const freqs = tones.map((t) => {
          let pm = char.root + t + 12 * char.padOct;
          while (pm > 76) pm -= 12; while (pm < 36) pm += 12;   // fold to range, keep the chord tone
          return Tone.Frequency(pm, "midi").toFrequency();
        });
        pad.triggerAttackRelease(freqs, eighth() * CS * 1.02, time);
      }
      const cs = songCell[pos % songCell.length];
      if (hold > 0) { hold--; m++; return; }   // let long notes ring — keeps the tune sparse
      if (cs.play && ladder) {
        const t = ladder[Math.max(0, Math.min(ladder.length - 1, cs.step))];
        let midi = char.root + t + 12 * (char.leadOct + cs.oct);
        while (midi > 96) midi -= 12; while (midi < 48) midi += 12;  // fold, never retune
        lead.triggerAttackRelease(Tone.Frequency(midi, "midi"), eighth() * cs.dur * 0.95, time);
        hold = cs.dur - 1;
      }
      m++;
    }, "8n");
    song.start(0);
    loops.push(song);
  }

  /* bassline — a low line walking the chord roots/fifths, filtered and blended
     low with a touch of the shared reverb so it sits under everything */
  {
    const bassSynth = track(new Tone.MonoSynth({
      oscillator: { type: char.bassWave },
      filter: { Q: 1, type: "lowpass", rolloff: -24 },
      filterEnvelope: { attack: 0.03, decay: 0.5, sustain: 0.35, release: 1.2, baseFrequency: 70, octaves: 2.2 },
      envelope: { attack: 0.02, decay: 0.4, sustain: 0.55, release: 1.4 },
      volume: -13,
    }).connect(filter));
    const bassVerbSend = track(new Tone.Gain(char.bassVerb).connect(reverb));
    bassSynth.connect(bassVerbSend);
    const pat = euclid(char.bassHits, 8, 0);
    const foldBass = (semi) => { let b = char.root - 12 + semi; while (b < 24) b += 12; while (b > 46) b -= 12; return b; };
    let bi = 0;
    const bl = new Tone.Loop((time) => {
      const onBeat = bi % 8 === 0;
      if (!onBeat && !pat[bi % 8]) { bi++; return; }
      const t = harmony.tones;
      let semi = t[0];                                   // default: the chord root
      if (!onBeat) {
        if (char.bassStyle === "octave") semi = t[0] + (bi % 2 ? 12 : 0);
        else if (char.bassStyle === "fifth") semi = (t[2] != null ? t[2] : t[0]);
        else if (char.bassStyle === "walk") semi = t[(bi >> 1) % t.length];
      }
      const dur = onBeat ? "4n" : "8n";
      bassSynth.triggerAttackRelease(Tone.Frequency(foldBass(semi), "midi"), dur, time, onBeat ? 0.9 : 0.6);
      bi++;
    }, "8n");
    bl.start(0);
    loops.push(bl);
  }

  const bloom = track(new Tone.PolySynth(Tone.Synth, {
    oscillator: { type: "sine" },
    envelope: { attack: 0.5, decay: 3, sustain: 0.5, release: 9 },
    volume: -12,
  }).connect(delay));
  bloom.triggerAttackRelease([
    Tone.Frequency(char.root, "midi").toFrequency(),
    Tone.Frequency(char.root + 7, "midi").toFrequency(),
    Tone.Frequency(char.root + 12 + char.scale.ints[1], "midi").toFrequency(),
  ], 8, Tone.now() + 0.1);

  /* rain shimmer — probability follows live precipitation */
  const plink = track(new Tone.Synth({
    oscillator: { type: "sine" },
    envelope: { attack: 0.002, decay: 0.5, sustain: 0, release: 1.4 },
    volume: -20,
  }).connect(delay));
  const plinkLoop = new Tone.Loop((time) => {
    if (Math.random() < params.rain * 0.75) {
      const deg = char.scale.ints[Math.floor(Math.random() * char.scale.ints.length)];
      plink.triggerAttackRelease(Tone.Frequency(char.root + 36 + deg + chord.offset, "midi"), 0.3, time);
    }
  }, "8n");
  plinkLoop.start(0);
  loops.push(plinkLoop);

  /* air — base level is the place's own, live wind raises it */
  const windGain = track(new Tone.Gain(0).connect(reverb));
  const windFilter = track(new Tone.Filter(char.airHz, "bandpass").connect(windGain));
  windFilter.Q.value = 1.3;
  const noise = track(new Tone.Noise("pink").connect(windFilter));
  noise.volume.value = -8;
  noise.start();
  const windLfo = track(new Tone.LFO(0.05, char.airHz * 0.6, char.airHz * 1.8).connect(windFilter.frequency));
  windLfo.start();
  windGain.gain.rampTo(char.air + params.wind * 0.1, 5);

  if (char.beat > 0 && char.kit !== "none") {
    /* Lo-fi drum bus: punchy and DRY, run through a bit-crusher and a high
       roll-off so it sounds like dusty sampled drums. Lo-fi amount decides how
       crushed and dark. A small dedicated reverb keeps beats defined. */
    const drumOut = track(new Tone.Gain(0.95 * char.beat).connect(filter));
    const crush = track(new Tone.BitCrusher(Math.round(4 + (1 - char.lofi) * 8)).connect(drumOut));
    crush.wet.value = 0.3 + char.lofi * 0.6;
    const drumLP = track(new Tone.Filter(2200 + (1 - char.lofi) * 8800, "lowpass").connect(crush));
    const drumBus = track(new Tone.Gain(1).connect(drumLP));
    const drumVerb = track(new Tone.Reverb({ decay: 1.1 + char.beat * 1.1, wet: 1 }).connect(drumOut));
    const drumSend = track(new Tone.Gain(0.1 + (1 - char.lofi) * 0.16).connect(drumVerb));
    drumBus.connect(drumSend);

    const kick = track(new Tone.MembraneSynth({
      pitchDecay: 0.03 + char.lofi * 0.02, octaves: 4, oscillator: { type: "sine" },
      envelope: { attack: 0.001, decay: 0.33 - char.lofi * 0.07, sustain: 0 }, volume: -5,
    }).connect(drumBus));
    // snare = a filtered noise burst + a short tuned body, together
    const snareBP = track(new Tone.Filter(1800, "bandpass").connect(drumBus));
    snareBP.Q.value = 0.8;
    const snareNoise = track(new Tone.NoiseSynth({
      noise: { type: char.lofi > 0.5 ? "pink" : "white" },
      envelope: { attack: 0.001, decay: 0.13 - char.lofi * 0.03, sustain: 0 }, volume: -13,
    }).connect(snareBP));
    const snareBody = track(new Tone.Synth({
      oscillator: { type: "triangle" },
      envelope: { attack: 0.001, decay: 0.12, sustain: 0 }, volume: -17,
    }).connect(drumBus));
    const hatHP = track(new Tone.Filter(7500 - char.lofi * 3200, "highpass").connect(drumBus));
    const hat = track(new Tone.NoiseSynth({
      noise: { type: char.lofi > 0.5 ? "pink" : "white" },
      envelope: { attack: 0.001, decay: 0.03, sustain: 0 }, volume: -23,
    }).connect(hatHP));

    const kf = Tone.Frequency(char.kickNote, "midi");
    const snareBodyF = Tone.Frequency(char.kickNote + 19, "midi");
    let step = 0;
    const rloop = new Tone.Loop((time) => {
      const D = songDrums;                                // evolve() can swap this
      const s = step % 16;
      const sixteenth = (60 / Tone.Transport.bpm.value) / 4;
      const t = time + (s % 2 === 1 ? char.swing * sixteenth * 2 : 0);   // swing the off-16ths
      const dens = 0.72 + params.density * 0.28;
      if (D.K[s]) kick.triggerAttackRelease(kf, "8n", t, 0.82 + Math.random() * 0.18);
      if (D.S[s]) {
        snareNoise.triggerAttackRelease("8n", t, 0.7 + Math.random() * 0.2);
        snareBody.triggerAttackRelease(snareBodyF, "16n", t, 0.5);
      }
      if (D.H[s] && Math.random() < dens) {
        hat.triggerAttackRelease("16n", t, (s % 4 === 0 ? 0.5 : 0.28) + Math.random() * 0.22);
      }
      step++;
    }, "16n");
    rloop.start(0);
    loops.push(rloop);

    // vinyl / tape surface noise for lo-fi places
    if (char.crackle > 0.05) {
      const crackHP = track(new Tone.Filter(2600, "highpass").connect(drumOut));
      const surface = track(new Tone.Noise("brown").connect(crackHP));
      surface.volume.value = -52 + char.crackle * 24;   // ~ -52..-28 dB
      surface.start();
    }
  }

  let evo = 0;
  return {
    master, filter, windGain, air: char.air, brightBias: char.brightBias, lofi: char.lofi,
    leadVerb: leadVerbNode, leadVerbBase: char.leadVerbAmt,
    /* A "movement": re-arrange the details while keeping the place's character.
       Called about once a minute so the piece never loops verbatim. */
    evolve() {
      evo++;
      const rng = mulberry32(hashStr(char.key + "|evo" + evo));
      songCell = genCell(char.seventh, char.chordSteps, char.melodyRest, rng);   // new tune
      if (rng() < 0.5 && songProg.length > 1) {                                  // reharmonise one chord
        const p = songProg.slice();
        p[1 + Math.floor(rng() * (p.length - 1))] = Math.floor(rng() * char.scale.ints.length);
        songProg = p;
      }
      if (char.beat > 0 && char.kit !== "none") {                                // drum variation + occasional fill
        const d = genDrums(char.kit, rng);
        if (rng() < 0.4) { d.S[15] = 1; if (rng() < 0.5) d.H[15] = 1; }
        songDrums = d;
      }
      det.voices.forEach((v) => {                                               // shift the drone wash
        v.degrees = v.degrees.map(() => Math.floor(rng() * char.scale.ints.length));
      });
    },
    dispose() {
      loops.forEach((l) => { try { l.dispose(); } catch (e) {} });
      nodes.forEach((n) => { try { n.dispose(); } catch (e) {} });
    },
  };
}

/* ================================================================== */
/* Time, sky, conditions                                               */
/* ================================================================== */
function localHour() {
  const off = state.tzOffsetSec != null ? state.tzOffsetSec : Math.round(state.center.lng / 15) * 3600;
  const t = new Date(Date.now() + off * 1000);
  return t.getUTCHours() + t.getUTCMinutes() / 60;
}

function applySky(hour) {
  const d = dayness(hour);
  const dusk = Math.exp(-Math.pow((hour - 6.5) % 24, 2) / 3) + Math.exp(-Math.pow((hour - 19) % 24, 2) / 3);
  const rs = document.documentElement.style;
  rs.setProperty("--top", `hsl(${232 - d * 22} ${42 - d * 10}% ${7 + d * 26}%)`);
  rs.setProperty("--bottom", `hsl(${232 - d * 30 + dusk * 60} ${38 + dusk * 28}% ${12 + d * 30 + dusk * 8}%)`);
  const day = d > 0.62;
  rs.setProperty("--ink", day ? "rgba(16,20,44,0.92)" : "rgba(236,238,250,0.94)");
  rs.setProperty("--faint", day ? "rgba(16,20,44,0.5)" : "rgba(236,238,250,0.45)");
  rs.setProperty("--line", day ? "rgba(16,20,44,0.18)" : "rgba(236,238,250,0.16)");
}

function applyConditions() {
  const hour = localHour();
  const d = dayness(hour);
  params.density = 0.3 + d * 0.7;
  params.rain = state.weather.rain;
  params.wind = state.weather.wind;
  const e = state.engine;
  if (e) {
    e.filter.frequency.rampTo(Math.min(9000, (360 + d * 2200 + (state.weather.temp - 10) * 20) * e.brightBias) * (1 - (e.lofi || 0) * 0.4), 2);
    e.windGain.gain.rampTo(e.air + state.weather.wind * 0.1, 3);
    // lead washes further into reverb at night, pulls forward a touch by day
    if (e.leadVerb) e.leadVerb.gain.rampTo(e.leadVerbBase * (0.7 + (1 - d) * 0.7), 3);
  }
  applySky(hour);
  renderInfo();
}

/* coordinates · time · weather, all on one line */
function renderInfo() {
  const hour = localHour();
  const hh = String(Math.floor(hour)).padStart(2, "0");
  const mm = String(Math.floor((hour - Math.floor(hour)) * 60)).padStart(2, "0");
  const cl = cellOf(state.center.lat, state.center.lng);
  const w = state.weather;
  let s = `${cl.lat.toFixed(3)}° ${cl.lng.toFixed(3)}° · ${hh}:${mm}`;
  if (w.desc) s += ` · ${Math.round(w.temp)}°C · ${w.desc} · wind ${Math.round(w.windKmh || 0)} km/h`;
  $("info").textContent = s;
}

/* ================================================================== */
/* Live data                                                           */
/* ================================================================== */
const WCODE = { 0: "clear", 1: "mostly clear", 2: "partly cloudy", 3: "overcast", 45: "fog", 48: "fog", 51: "drizzle", 53: "drizzle", 55: "drizzle", 61: "light rain", 63: "rain", 65: "heavy rain", 66: "freezing rain", 67: "freezing rain", 71: "light snow", 73: "snow", 75: "heavy snow", 77: "snow", 80: "showers", 81: "showers", 82: "heavy showers", 85: "snow showers", 86: "snow showers", 95: "thunderstorm", 96: "thunderstorm", 99: "thunderstorm" };

async function fetchWeather() {
  try {
    const { lat, lng } = state.center;
    const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m,precipitation,wind_speed_10m,weather_code&timezone=auto`);
    const j = await r.json();
    state.tzOffsetSec = j.utc_offset_seconds;
    const c = j.current;
    const snowish = c.weather_code >= 71 && c.weather_code <= 86;
    state.weather = {
      temp: c.temperature_2m,
      rain: Math.min((c.precipitation || 0) / 3, 1) * (snowish ? 0.5 : 1),
      wind: Math.min((c.wind_speed_10m || 0) / 40, 1),
      windKmh: c.wind_speed_10m || 0,
      desc: WCODE[c.weather_code] || "",
    };
    applyConditions();
  } catch (e) { /* offline is fine — the sound still plays */ }
}

async function reverseTitle() {
  try {
    const { lat, lng } = state.center;
    const r = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lng}&localityLanguage=en`);
    const j = await r.json();
    const t = j.city || j.locality || j.principalSubdivision || j.countryName;
    if (t) setLocationName(t);
  } catch (e) {}
}

/* ================================================================== */
/* Rendering                                                           */
/* ================================================================== */
/* The location name lives in the search field. Only overwrite it while the
   user isn't typing, so a search-in-progress is never clobbered. */
function setLocationName(name) {
  state.title = name;
  const q = $("q");
  if (document.activeElement !== q) q.value = name;
}

function renderCharacter() {
  const c = state.char;
  setLocationName(state.title);
  const rings = $("rings");
  rings.innerHTML = "";
  for (let i = 0; i < c.voices; i++) {
    const el = document.createElement("span");
    el.className = "ring";
    el.style.inset = (i * (115 / c.voices)) + "px";
    el.style.setProperty("--dur", (7 + i * 3.3) + "s");
    rings.appendChild(el);
  }
  document.documentElement.style.setProperty("--beat", (60 / c.tempo) + "s");
  document.body.classList.toggle("grooving", c.rhythm > 0);
}

/* ================================================================== */
/* Travel                                                              */
/* ================================================================== */
function travel(pos, title) {
  state.center = pos;
  state.tzOffsetSec = null; // re-estimate until weather returns the real offset
  if (title) { setLocationName(title); } else { setLocationName(pos.lat.toFixed(3) + "°, " + pos.lng.toFixed(3) + "°"); reverseTitle(); }
  const nc = makeCharacter(pos.lat, pos.lng);
  const changed = nc.key !== state.char.key;
  state.char = nc;
  const q = $("q");
  q.classList.add("fading");
  setTimeout(() => q.classList.remove("fading"), 1200);
  renderCharacter();
  applyConditions();
  fetchWeather();
  if (changed && state.engine) {
    fadeDispose(state.engine, 2.6);          // registry-tracked teardown of the old engine
    Tone.Transport.bpm.rampTo(nc.tempo, 2);
    const eng = buildEngine(nc, makeDetails(nc));
    state.engine = eng;
    registerEngine(eng);
    eng.master.gain.rampTo(0.9, 3.2);
  }
}

/* ================================================================== */
/* Controls                                                            */
/* ================================================================== */
/* Engine lifecycle. Every engine is registered so a stop can tear down
   ALL of them — this is what guarantees nothing is left sounding, even a
   stray engine from a fast double-tap or overlapping travels. */
function registerEngine(e) { state.engines.push(e); }
function fadeDispose(e, secs) {
  if (!e) return;
  try { e.master.gain.rampTo(0, secs); } catch (x) {}
  const i = state.engines.indexOf(e);
  if (i >= 0) state.engines.splice(i, 1);
  setTimeout(() => { try { e.dispose(); } catch (x) {} }, secs * 1000 + 400);
}
function stopAll(secs) {
  state.engines.slice().forEach((e) => fadeDispose(e, secs));
  state.engine = null;
}

let toggling = false;   // re-entrancy guard: an await window must not start twice
$("circle").addEventListener("click", async () => {
  if (toggling) return;
  toggling = true;
  try {
    if (state.playing) {
      state.playing = false;
      document.body.classList.remove("playing");
      $("hint").textContent = "tap to listen";
      stopAll(1.4);
      Tone.Transport.stop();          // halt every loop at once — nothing can keep firing
      return;
    }
    await Tone.start();
    Tone.Transport.bpm.value = state.char.tempo;
    if (Tone.Transport.state !== "started") Tone.Transport.start();
    stopAll(0.2);                       // clear any straggler before starting fresh
    const eng = buildEngine(state.char, makeDetails(state.char));
    state.engine = eng;
    registerEngine(eng);
    eng.master.gain.rampTo(0.95, 1.2);
    state.playing = true;
    document.body.classList.add("playing");
    $("hint").textContent = "tap to stop";
    applyConditions();
  } catch (err) {
    $("msg").textContent = "audio error: " + err.message;
  } finally {
    toggling = false;
  }
});

function locate(silent) {
  if (!navigator.geolocation) { if (!silent) $("msg").textContent = "geolocation unavailable"; return; }
  if (!silent) $("msg").textContent = "locating…";
  navigator.geolocation.getCurrentPosition(
    (p) => { $("msg").textContent = ""; travel({ lat: p.coords.latitude, lng: p.coords.longitude }); },
    () => { if (!silent) $("msg").textContent = "location permission denied · try searching instead"; },
    { timeout: 8000 }
  );
}
$("locate").addEventListener("click", () => locate(false));

/* search — any place on earth via Open-Meteo geocoding */
let searchTimer = null;
$("q").addEventListener("input", (e) => {
  clearTimeout(searchTimer);
  const q = e.target.value.trim();
  if (q.length < 2) { $("results").classList.remove("open"); return; }
  searchTimer = setTimeout(async () => {
    try {
      const r = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=6&language=en&format=json`);
      const j = await r.json();
      const box = $("results");
      box.innerHTML = "";
      (j.results || []).forEach((res) => {
        const b = document.createElement("button");
        const sub = [res.admin1, res.country].filter(Boolean).join(", ");
        b.innerHTML = res.name + '<span class="sub">' + sub + "</span>";
        b.addEventListener("click", () => {
          box.classList.remove("open");
          $("q").blur();
          travel({ lat: res.latitude, lng: res.longitude }, res.name);
        });
        box.appendChild(b);
      });
      box.classList.toggle("open", (j.results || []).length > 0);
    } catch (err) {}
  }, 300);
});
// the field doubles as the location title: select on focus, restore on blur
$("q").addEventListener("focus", () => $("q").select());
$("q").addEventListener("blur", () => { $("results").classList.remove("open"); $("q").value = state.title; });
$("q").addEventListener("keydown", (e) => {
  if (e.key === "Escape") { $("q").value = state.title; $("results").classList.remove("open"); $("q").blur(); }
});
// clicking a result must not blur-then-close before the click lands
$("results").addEventListener("mousedown", (e) => e.preventDefault());
document.addEventListener("click", (e) => {
  if (!e.target.closest(".top")) $("results").classList.remove("open");
});

/* ================================================================== */
/* Boot                                                                */
/* ================================================================== */
renderCharacter();
applyConditions();
fetchWeather();
reverseTitle();
locate(true);                       // default to the real current location
setInterval(applyConditions, 20000);   // real clock drives the sound
setInterval(fetchWeather, 10 * 60 * 1000); // live weather refresh
setInterval(() => { if (state.playing && state.engine && state.engine.evolve) state.engine.evolve(); }, 60000); // a new movement each minute
</script>
</body>
</html>
